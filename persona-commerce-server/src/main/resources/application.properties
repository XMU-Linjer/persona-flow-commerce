spring.application.name=persona-commerce-server

# ─── Profile Auto-Refresh Scheduler ───
# hybrid trigger: count threshold + max-delay + idle suppression
behavior.profile.refresh.enabled=true
behavior.profile.refresh.batch-threshold=5
behavior.profile.refresh.max-delay-seconds=30
behavior.profile.refresh.days=30
behavior.profile.refresh.stale-timeout-seconds=300
behavior.profile.refresh.cleanup-interval-seconds=300