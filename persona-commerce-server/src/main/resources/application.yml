spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  application:
    name: persona-commerce-server

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:persona_flow_commerce}
    username: ${MYSQL_USER:persona_flow}
    password: ${MYSQL_PASSWORD:123456}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 2s

  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:${RABBITMQ_DEFAULT_USER:persona_flow}}
    password: ${RABBITMQ_PASSWORD:${RABBITMQ_DEFAULT_PASS:123456}}

commerce:
  jwt:
    secret: ${COMMERCE_JWT_SECRET:local-development-jwt-secret-change-before-production}
    expires-in: 7200

persona:
  agent:
    base-url: ${PERSONA_AGENT_BASE_URL:http://127.0.0.1:8001}
    profile-build-path: /agent/profile/build
    timeout-ms: ${PERSONA_AGENT_TIMEOUT_MS:30000}

management:
  endpoint:
    health:
      show-details: always
