spring:
  application:
    name: persona-commerce-server

  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2s

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}

commerce:
  jwt:
    secret: ${COMMERCE_JWT_SECRET:local-development-jwt-secret-change-before-production}
    expires-in: 7200

management:
  endpoint:
    health:
      show-details: always
